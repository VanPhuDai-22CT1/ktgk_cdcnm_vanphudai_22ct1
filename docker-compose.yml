services:
  backend:
    image: gfhgfhdshs/ktgk_cdcnm_vanphudai_22ct1-backend:latest
    container_name: backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - APP_NAME=DevOpsMiniProject

  frontend:
    image: gfhgfhdshs/ktgk_cdcnm_vanphudai_22ct1-frontend:latest
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - BACKEND_URL=http://localhost:5000

  db:
    image: mysql:8
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devops
    ports:
      - "3306:3306"